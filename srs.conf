listen              1935;
max_connections     1000;
daemon              off;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {

    min_latency     on;          # 🔥 IMPORTANT

    play {
        gop_cache       off;     # reduce startup delay
    }

    hls {
        enabled         on;
        hls_fragment    1;       # 1 sec per segment
        hls_window      3;       # only keep 3 sec
        hls_cleanup     on;
        hls_dispose     0;
        hls_wait_keyframe off;
    }

    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}